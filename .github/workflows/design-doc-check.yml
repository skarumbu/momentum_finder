name: Design Doc Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  design-doc:
    uses: skarumbu/my-website/.github/workflows/design-doc-check-reusable.yml@main
    with:
      repo_name: momentum-finder
    secrets:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      DESIGN_DOC_GH_TOKEN: ${{ secrets.DESIGN_DOC_GH_TOKEN }}
