name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/momentum-finder:latest -f docker/dockerfile .

      - name: Push Docker image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/momentum-finder:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name momentum-finder-prod \
            --resource-group my-website-prod-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/momentum-finder:latest \
            --revision-suffix "deploy-$(echo ${{ github.sha }} | cut -c1-7)"

  update-architecture:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my-website
        uses: actions/checkout@v4
        with:
          repository: skarumbu/my-website
          token: ${{ secrets.MY_WEBSITE_DISPATCH_TOKEN }}

      - name: Update deploy metadata
        run: |
          git pull origin main
          DATE=$(date -u +%Y-%m-%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          jq --arg date "$DATE" --arg sha "$SHORT_SHA" \
            '."momentum-finder" = {"lastDeploy": $date, "commitSha": $sha}' \
            src/architecture-metadata.json > /tmp/meta.json
          mv /tmp/meta.json src/architecture-metadata.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/architecture-metadata.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: update momentum-finder deploy metadata"
          git push

  update-arch-content:
    needs: update-architecture
    uses: skarumbu/my-website/.github/workflows/arch-content-update-reusable.yml@main
    with:
      repo_name: momentum-finder
      commit_sha: ${{ github.sha }}
      commit_message: ${{ github.event.head_commit.message }}
    secrets:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      ARCH_UPDATE_GH_TOKEN: ${{ secrets.MY_WEBSITE_DISPATCH_TOKEN }}
