name: Weekly Model Retrain

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC, before the week's games begin
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r docker/requirements.txt

      - name: Retrain model on current season
        run: python model_trainer.py

      - name: Commit updated model if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add momentum_model.pkl
          if git diff --staged --quiet; then
            echo "Model unchanged, skipping commit."
          else
            git commit -m "chore: retrain model on $(date -u '+%Y-%m-%d') season data"
            git push
          fi
