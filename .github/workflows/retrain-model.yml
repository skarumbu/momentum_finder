name: Weekly Model Retrain

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC, before the week's games begin
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r docker/requirements.txt

      - name: Retrain model on current season
        run: python model_trainer.py

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload models to Azure Blob Storage
        run: |
          ACCOUNT_NAME=$(az storage account list \
            --resource-group my-website-prod-rg \
            --query "[?starts_with(name, 'modelsst')].name" \
            -o tsv)
          CONN_STR=$(az storage account show-connection-string \
            --name "$ACCOUNT_NAME" \
            --resource-group my-website-prod-rg \
            --query connectionString \
            -o tsv)
          az storage blob upload \
            --connection-string "$CONN_STR" \
            --container-name models \
            --name home_run_model.pkl \
            --file home_run_model.pkl \
            --overwrite
          az storage blob upload \
            --connection-string "$CONN_STR" \
            --container-name models \
            --name away_run_model.pkl \
            --file away_run_model.pkl \
            --overwrite
